<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Backgrounds Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
        h1 { font-size: 1.8rem; font-weight: 300; margin-bottom: 48px; color: #aaa; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 800px; width: 100%; }
        a.card { display: block; background: #141414; border-radius: 12px; overflow: hidden; border: 1px solid #222; text-decoration: none; color: #fff; transition: transform 0.2s, border-color 0.2s; }
        a.card:hover { transform: scale(1.03); border-color: #4a9eff; }
        .card video { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; pointer-events: none; }
        .card .label { padding: 12px 16px; font-size: 0.9rem; color: #999; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>Video Backgrounds</h1>
    <div class="grid">
        <a class="card" href="bg1.html"><video src="https://files.catbox.moe/0vbm1t.mp4" autoplay loop muted playsinline></video><div class="label">Loop Wave — Abstract BW</div></a>
        <a class="card" href="bg2.html"><video src="https://files.catbox.moe/w1f1ht.mp4" autoplay loop muted playsinline></video><div class="label">Pexels #34127887</div></a>
        <a class="card" href="bg3.html"><video src="https://files.catbox.moe/szxevl.mp4" autoplay loop muted playsinline></video><div class="label">Pexels #36439665</div></a>
        <a class="card" href="bg4.html"><video src="https://files.catbox.moe/2cqaw8.mp4" autoplay loop muted playsinline></video><div class="label">Pexels #29607597</div></a>
    </div>
</body>
</html>
