<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgrounds Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; color: #222; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 40px 20px; }
        h1 { text-align: center; font-size: 1.8rem; font-weight: 300; margin-bottom: 12px; color: #333; }
        h2 { text-align: center; font-size: 1rem; font-weight: 400; margin-bottom: 32px; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .section { max-width: 900px; margin: 0 auto 48px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        a.card { display: block; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e0e0e0; text-decoration: none; color: #222; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        a.card:hover { transform: scale(1.03); border-color: #4a9eff; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .card video, .card .lottie-preview { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; pointer-events: none; }
        .card .lottie-preview { background: #f8f8f8; display: flex; align-items: center; justify-content: center; }
        .card .lottie-preview dotlottie-player { width: 100%; height: 100%; }
        .card .label { padding: 12px 16px; font-size: 0.9rem; color: #666; }
        .divider { border: none; border-top: 1px solid #e8e8e8; margin: 48px auto; max-width: 900px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
    <script src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" type="module"></script>
</head>
<body>
    <h1>Backgrounds Demo</h1>

    <div class="section">
        <h2>Video Backgrounds</h2>
        <div class="grid">
            <a class="card" href="bg1.html"><video src="https://files.catbox.moe/0vbm1t.mp4" autoplay loop muted playsinline></video><div class="label">Loop Wave — Abstract BW</div></a>
            <a class="card" href="bg2.html"><video src="https://files.catbox.moe/w1f1ht.mp4" autoplay loop muted playsinline></video><div class="label">Pexels #34127887</div></a>
            <a class="card" href="bg3.html"><video src="https://files.catbox.moe/szxevl.mp4" autoplay loop muted playsinline></video><div class="label">Pexels #36439665</div></a>
            <a class="card" href="bg4.html"><video src="https://files.catbox.moe/2cqaw8.mp4" autoplay loop muted playsinline></video><div class="label">Pexels #29607597</div></a>
        </div>
    </div>

    <hr class="divider">

    <div class="section">
        <h2>Lottie Backgrounds</h2>
        <div class="grid">
            <a class="card" href="lottie1.html"><div class="lottie-preview"><dotlottie-player src="https://assets-v2.lottiefiles.com/a/6878f150-fff6-11ee-9cd8-63bb544320e4/UrHuVmUWwJ.lottie" autoplay loop></dotlottie-player></div><div class="label">Animation 1713711602132</div></a>
            <a class="card" href="lottie2.html"><div class="lottie-preview"><dotlottie-player src="https://assets-v2.lottiefiles.com/a/28599d2a-34e0-11f0-9e1e-c305c862c7fe/c6faZRGSJ1.lottie" autoplay loop></dotlottie-player></div><div class="label">Abevance</div></a>
            <a class="card" href="lottie3.html"><div class="lottie-preview"><dotlottie-player src="https://assets-v2.lottiefiles.com/a/3ed68a12-5651-11f0-949e-d322d57f6d98/vTFg9BsHvj.lottie" autoplay loop></dotlottie-player></div><div class="label">Hero Section Background</div></a>
            <a class="card" href="lottie4.html"><div class="lottie-preview"><dotlottie-player src="https://assets-v2.lottiefiles.com/a/c204c228-25a0-11f0-a7ed-7bbf1423c30c/6NMj8i5QpR.lottie" autoplay loop></dotlottie-player></div><div class="label">hisuiAI LP Animation 02</div></a>
        </div>
    </div>
</body>
</html>
